name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SignPath PowerShell module
        if: ${{ github.event_name != 'pull_request' && env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name SignPath -Scope CurrentUser -Force -Repository PSGallery

      - name: Configure build preset
        shell: pwsh
        run: |
          if ($env:SIGNPATH_API_TOKEN -and $env:GITHUB_EVENT_NAME -ne 'pull_request') {
            $signedDllPath = (Join-Path (Get-Location) 'out/build/bin/Release/Toolscreen.signed-package-input.dll')
            cmake --preset vs2022-x64 -DTOOLSCREEN_PACKAGING_DLL_PATH="$signedDllPath"
          } else {
            cmake --preset vs2022-x64
          }

      - name: Build unsigned DLL
        shell: cmd
        run: cmake --build --preset release --target Toolscreen

      - name: Build CLI integration test runner
        shell: cmd
        run: cmake --build --preset release --target toolscreen_gui_integration_tests

      - name: Run CLI integration tests
        shell: cmd
        run: out\build\bin\Release\toolscreen_gui_integration_tests.exe --run-all

      - name: Sign DLL with SignPath test certificate
        if: ${{ github.event_name != 'pull_request' && env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: |
          $artifactDllPath = 'out/build/bin/Release/Toolscreen.dll'
          $signedDllPath = 'out/build/bin/Release/Toolscreen.signed-package-input.dll'

          Import-Module SignPath

          if (-not (Test-Path $artifactDllPath)) {
            throw "Expected unsigned DLL not found: $artifactDllPath"
          }

          if (Test-Path $signedDllPath) {
            Remove-Item -Path $signedDllPath -Force
          }

          Submit-SigningRequest `
            -InputArtifactPath $artifactDllPath `
            -ApiToken $env:SIGNPATH_API_TOKEN `
            -OrganizationId '0126c615-e5f1-4fed-a438-6b8de149c8f4' `
            -ProjectSlug 'Toolscreen' `
            -SigningPolicySlug 'test-signing' `
            -OutputArtifactPath $signedDllPath `
            -WaitForCompletion

          if (-not (Test-Path $signedDllPath)) {
            throw "Expected signed DLL not found: $signedDllPath"
          }

          Copy-Item -Path $signedDllPath -Destination $artifactDllPath -Force

      - name: Prepare EXE packaging inputs
        shell: cmd
        run: cmake --build --preset release --target toolscreen_prepare_easyinject_exe_inputs

      - name: Reconfigure packaging preset
        shell: pwsh
        run: |
          if ($env:SIGNPATH_API_TOKEN -and $env:GITHUB_EVENT_NAME -ne 'pull_request') {
            $signedDllPath = (Resolve-Path 'out/build/bin/Release/Toolscreen.signed-package-input.dll').Path
            cmake --preset vs2022-x64 -DTOOLSCREEN_PACKAGING_DLL_PATH="$signedDllPath"
          } else {
            cmake --preset vs2022-x64
          }

      - name: Remove stale packaged artifacts
        shell: pwsh
        run: |
          $outputDir = 'out/build/bin/Release'
          $patterns = @(
            'Toolscreen-*-double-click-me.jar'
            'Toolscreen-*-double-click-me.exe'
            'toolscreen-downloader.jar'
            'toolscreen-downloader.exe'
          )

          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $outputDir -File -Filter $pattern -ErrorAction SilentlyContinue | Remove-Item -Force
          }

      - name: Build installer EXE package
        shell: cmd
        run: cmake --build --preset release --target installer_exe

      - name: Build downloader EXE package
        shell: cmd
        run: cmake --build --preset release --target downloader_exe

      - name: Build JAR package
        shell: cmd
        run: cmake --build --preset release --target jar

      - name: Run CTest packaging smoke tests
        shell: cmd
        run: ctest --preset release --exclude-regex "^toolscreen_integration_"

      - name: Sign installer EXE with SignPath test certificate
        if: ${{ github.event_name != 'pull_request' && env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: |
          $installerMatches = Get-ChildItem 'out/build/bin/Release' -File -Filter 'Toolscreen-*-double-click-me.exe'

          if ($installerMatches.Count -ne 1) {
            throw "Expected exactly one unsigned installer EXE, found $($installerMatches.Count)"
          }

          $installerPath = $installerMatches[0].FullName
          $signedInstallerPath = Join-Path $installerMatches[0].DirectoryName ($installerMatches[0].BaseName + '.signed' + $installerMatches[0].Extension)

          Import-Module SignPath

          if (Test-Path $signedInstallerPath) {
            Remove-Item -Path $signedInstallerPath -Force
          }

          Submit-SigningRequest `
            -InputArtifactPath $installerPath `
            -ApiToken $env:SIGNPATH_API_TOKEN `
            -OrganizationId '0126c615-e5f1-4fed-a438-6b8de149c8f4' `
            -ProjectSlug 'Toolscreen' `
            -SigningPolicySlug 'test-signing' `
            -OutputArtifactPath $signedInstallerPath `
            -WaitForCompletion

          if (-not (Test-Path $signedInstallerPath)) {
            throw "Expected signed installer EXE not found: $signedInstallerPath"
          }

          Copy-Item -Path $signedInstallerPath -Destination $installerPath -Force
          Remove-Item -Path $signedInstallerPath -Force

      - name: Sign downloader EXE with SignPath test certificate
        if: ${{ github.event_name != 'pull_request' && env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: |
          $downloaderPath = 'out/build/bin/Release/toolscreen-downloader.exe'
          $signedDownloaderPath = 'out/build/bin/Release/toolscreen-downloader.signed.exe'

          Import-Module SignPath

          if (-not (Test-Path $downloaderPath)) {
            throw "Expected unsigned downloader EXE not found: $downloaderPath"
          }

          if (Test-Path $signedDownloaderPath) {
            Remove-Item -Path $signedDownloaderPath -Force
          }

          Submit-SigningRequest `
            -InputArtifactPath $downloaderPath `
            -ApiToken $env:SIGNPATH_API_TOKEN `
            -OrganizationId '0126c615-e5f1-4fed-a438-6b8de149c8f4' `
            -ProjectSlug 'Toolscreen' `
            -SigningPolicySlug 'test-signing' `
            -OutputArtifactPath $signedDownloaderPath `
            -WaitForCompletion

          if (-not (Test-Path $signedDownloaderPath)) {
            throw "Expected signed downloader EXE not found: $signedDownloaderPath"
          }

          Copy-Item -Path $signedDownloaderPath -Destination $downloaderPath -Force
          Remove-Item -Path $signedDownloaderPath -Force

      - name: Restore signed DLL to release output
        if: ${{ github.event_name != 'pull_request' && env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: |
          $signedDllPath = 'out/build/bin/Release/Toolscreen.signed-package-input.dll'
          $artifactDllPath = 'out/build/bin/Release/Toolscreen.dll'

          if (-not (Test-Path $signedDllPath)) {
            throw "Expected preserved signed DLL not found: $signedDllPath"
          }

          Copy-Item -Path $signedDllPath -Destination $artifactDllPath -Force

      - name: Rename release artifacts
        shell: pwsh
        run: |
          $outputDir = 'out/build/bin/Release'
          $suffix = '-not-legal-for-speedruns'

          function Get-SingleArtifactPath {
            param(
              [string]$Pattern,
              [string]$Label
            )

            $matches = Get-ChildItem $outputDir -File -Filter $Pattern

            if ($matches.Count -ne 1) {
              throw "Expected exactly one $Label matching '$Pattern' in $outputDir, found $($matches.Count)"
            }

            return $matches[0].FullName
          }

          $filesToRename = @(
            Join-Path $outputDir 'Toolscreen.dll'
            Join-Path $outputDir 'Toolscreen.pdb'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.jar' 'main installer jar'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.exe' 'main installer exe'
            Join-Path $outputDir 'toolscreen-downloader.jar'
            Join-Path $outputDir 'toolscreen-downloader.exe'
          )

          foreach ($filePath in $filesToRename) {
            if (-not (Test-Path $filePath)) {
              throw "Expected artifact not found: $filePath"
            }

            $item = Get-Item $filePath
            $renamed = '{0}{1}{2}' -f $item.BaseName, $suffix, $item.Extension
            Move-Item -Path $item.FullName -Destination (Join-Path $item.DirectoryName $renamed)
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-release-artifacts
          if-no-files-found: error
          retention-days: 14
          path: |
            out/build/bin/Release/Toolscreen-not-legal-for-speedruns.dll
            out/build/bin/Release/Toolscreen-not-legal-for-speedruns.pdb
            out/build/bin/Release/Toolscreen-*-double-click-me-not-legal-for-speedruns.jar
            out/build/bin/Release/Toolscreen-*-double-click-me-not-legal-for-speedruns.exe
            out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.jar
            out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.exe