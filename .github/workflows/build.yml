name: Build

on:
  push:
    paths-ignore:
      - README.md
      - docs/**
      - LICENSE
      - .github/ISSUE_TEMPLATE/**
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
      - LICENSE
      - .github/ISSUE_TEMPLATE/**

permissions:
  actions: read
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve unsigned release metadata
        id: release_meta
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $versionFile = Join-Path $env:GITHUB_WORKSPACE 'ToolscreenVersion.cmake'
          $versionContent = Get-Content $versionFile -Raw

          $majorMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_MAJOR\s+(\d+)\)')
          $minorMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_MINOR\s+(\d+)\)')
          $patchMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_PATCH\s+(\d+)\)')

          if (-not $majorMatch.Success -or -not $minorMatch.Success -or -not $patchMatch.Success) {
            throw "Failed to parse version from $versionFile"
          }

          $version = '{0}.{1}.{2}' -f $majorMatch.Groups[1].Value, $minorMatch.Groups[1].Value, $patchMatch.Groups[1].Value
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "unsigned-v$version-run-$env:GITHUB_RUN_NUMBER-$shortSha"
          $title = "Unsigned CI build $version ($shortSha)"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "short_sha=$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore CMake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            out/build/_deps
            out/build/downloads
          key: windows-build-deps-v1-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'ToolscreenVersion.cmake', 'liblogger/CMakeLists.txt') }}
          restore-keys: |
            windows-build-deps-v1-

      - name: Restore Maven repository cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: windows-maven-v1-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'ToolscreenVersion.cmake') }}
          restore-keys: |
            windows-maven-v1-

      - name: Fetch latest signed liblogger artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $destination = Join-Path (Get-Location) 'out/prebuilt-liblogger'
          & .\scripts\fetch_signed_liblogger.ps1 -DestinationDirectory $destination

      - name: Configure build preset
        shell: pwsh
        run: |
          $prebuiltLoggerDllPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.dll').Path
          $prebuiltLoggerPdbPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.pdb').Path

          cmake --preset vs2022-x64 -DTOOLSCREEN_PREBUILT_LIBLOGGER_DLL_PATH="$prebuiltLoggerDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_PDB_PATH="$prebuiltLoggerPdbPath"

      - name: Build DLLs and CLI integration test runner
        shell: cmd
        run: cmake --build --preset release --parallel --target Toolscreen toolscreen_gui_integration_tests

      - name: Run CLI integration tests
        shell: cmd
        run: out\build\bin\Release\toolscreen_gui_integration_tests.exe --run-all

      - name: Prepare EXE packaging inputs
        shell: cmd
        run: cmake --build --preset release --parallel --target toolscreen_prepare_easyinject_exe_inputs

      - name: Reconfigure packaging preset
        shell: pwsh
        run: |
          $prebuiltLoggerDllPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.dll').Path
          $prebuiltLoggerPdbPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.pdb').Path

          cmake --preset vs2022-x64 -DTOOLSCREEN_PREBUILT_LIBLOGGER_DLL_PATH="$prebuiltLoggerDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_PDB_PATH="$prebuiltLoggerPdbPath"

      - name: Remove stale packaged artifacts
        shell: pwsh
        run: |
          $outputDir = 'out/build/bin/Release'
          $patterns = @(
            'Toolscreen-*-double-click-me.jar'
            'Toolscreen-*-double-click-me.exe'
            'toolscreen-downloader.jar'
            'toolscreen-downloader.exe'
            'tioolscrteen-downloader.jar'
            'tioolscrteen-downloader.exe'
          )

          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $outputDir -File -Filter $pattern -ErrorAction SilentlyContinue | Remove-Item -Force
          }

      - name: Build installer EXE package
        shell: cmd
        run: cmake --build --preset release --parallel --target installer_exe

      - name: Build downloader EXE package
        shell: cmd
        run: cmake --build --preset release --parallel --target downloader_exe

      - name: Build JAR package
        shell: cmd
        run: cmake --build --preset release --parallel --target jar

      - name: Validate PE metadata
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE 'scripts\verify_pe_metadata.ps1'
          $artifactDirectory = Join-Path $env:GITHUB_WORKSPACE 'out\build\bin\Release'
          & $scriptPath -ArtifactDirectory $artifactDirectory

      - name: Run CTest packaging smoke tests
        shell: cmd
        run: ctest --preset release --exclude-regex "^toolscreen_integration_"

      - name: Rename release artifacts
        shell: pwsh
        run: |
          $outputDir = 'out/build/bin/Release'
          $suffix = '-not-legal-for-speedruns'

          function Get-SingleArtifactPath {
            param(
              [string]$Pattern,
              [string]$Label
            )

            $matches = Get-ChildItem $outputDir -File -Filter $Pattern

            if ($matches.Count -ne 1) {
              throw "Expected exactly one $Label matching '$Pattern' in $outputDir, found $($matches.Count)"
            }

            return $matches[0].FullName
          }

          $filesToRename = @(
            Join-Path $outputDir 'Toolscreen.dll'
            Join-Path $outputDir 'Toolscreen.pdb'
            Join-Path $outputDir 'liblogger_x64.dll'
            Join-Path $outputDir 'liblogger_x64.pdb'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.jar' 'main installer jar'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.exe' 'main installer exe'
            Join-Path $outputDir 'toolscreen-downloader.jar'
            Join-Path $outputDir 'toolscreen-downloader.exe'
          )

          foreach ($filePath in $filesToRename) {
            if (-not (Test-Path $filePath)) {
              throw "Expected artifact not found: $filePath"
            }

            $item = Get-Item $filePath
            $renamed = '{0}{1}{2}' -f $item.BaseName, $suffix, $item.Extension
            Move-Item -Path $item.FullName -Destination (Join-Path $item.DirectoryName $renamed)
          }

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-unsigned-artifacts
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
          path: |
            out/build/bin/Release/Toolscreen-not-legal-for-speedruns.dll
            out/build/bin/Release/Toolscreen-not-legal-for-speedruns.pdb
            out/build/bin/Release/liblogger_x64-not-legal-for-speedruns.dll
            out/build/bin/Release/liblogger_x64-not-legal-for-speedruns.pdb
            out/build/bin/Release/Toolscreen-*-double-click-me-not-legal-for-speedruns.jar
            out/build/bin/Release/Toolscreen-*-double-click-me-not-legal-for-speedruns.exe
            out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.jar
            out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.exe

      - name: Publish unsigned artifacts to GitHub release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $tag = '${{ steps.release_meta.outputs.tag }}'
          $title = '${{ steps.release_meta.outputs.title }}'
          $notesPath = Join-Path $env:RUNNER_TEMP 'unsigned-release-notes.md'

          @"
          Unsigned CI archive for Toolscreen.

          Version: ${{ steps.release_meta.outputs.version }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          These assets are the regular unsigned build outputs from the Build workflow.
          "@ | Set-Content -Path $notesPath -Encoding utf8

          gh release view $tag -R $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag -R $repo --title $title --notes-file $notesPath --prerelease
          } else {
            gh release create $tag -R $repo --title $title --notes-file $notesPath --prerelease --target $env:GITHUB_SHA
          }

          $assets = @(
            'out/build/bin/Release/Toolscreen-not-legal-for-speedruns.dll',
            'out/build/bin/Release/Toolscreen-not-legal-for-speedruns.pdb',
            'out/build/bin/Release/liblogger_x64-not-legal-for-speedruns.dll',
            'out/build/bin/Release/liblogger_x64-not-legal-for-speedruns.pdb'
          )

          $assets += (Get-ChildItem 'out/build/bin/Release' -File -Filter 'Toolscreen-*-double-click-me-not-legal-for-speedruns.jar').FullName
          $assets += (Get-ChildItem 'out/build/bin/Release' -File -Filter 'Toolscreen-*-double-click-me-not-legal-for-speedruns.exe').FullName
          $assets += @(
            'out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.jar',
            'out/build/bin/Release/toolscreen-downloader-not-legal-for-speedruns.exe'
          )

          gh release upload $tag -R $repo --clobber $assets
